name: 0xCI Teardown

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read

# Prevent this from racing with a deploy on the same PR
concurrency:
  group: sst-${{ github.repository }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: 0xci-teardown-pr-${{ github.event.pull_request.number }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else echo "No lockfile found, skipping install"
          fi

      - name: Install SST providers
        run: npx sst install

      - name: Destroy preview environment
        run: |
          npx sst unlock --stage pr-${{ github.event.pull_request.number }} || true
          npx sst remove --stage pr-${{ github.event.pull_request.number }}
        env:
          REPO_NAME: ${{ github.event.repository.name }}
