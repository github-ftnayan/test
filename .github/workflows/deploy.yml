name: 0xCI Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

# Cancel in-progress deploys on new pushes; teardown uses the same group with cancel-in-progress: false
concurrency:
  group: sst-${{ github.repository }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: 0xci-pr-${{ github.event.pull_request.number }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else echo "No lockfile found, skipping install"
          fi

      - name: Install SST providers
        run: npx sst install

      - name: Deploy preview environment
        run: |
          npx sst deploy --stage pr-${{ github.event.pull_request.number }} 2>&1 | tee /tmp/sst-out.txt
          cat /tmp/sst-out.txt
        env:
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Save SST outputs
        run: |
          mkdir -p .sst
          # SST Ion prints outputs as "  key: value" lines at the end of deploy
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.(cloudfront\.net|amazonaws\.com|on\.aws)[^ ]*' /tmp/sst-out.txt | tail -1)
          if [ -n "$URL" ]; then
            echo "{\"url\":\"$URL\"}" > .sst/output.json
            echo "Captured URL: $URL"
          else
            echo "Warning: No deployment URL found in SST output"
            ls -la .sst/ 2>/dev/null || echo ".sst directory not found"
          fi

      - name: Upload SST outputs
        uses: actions/upload-artifact@v4
        with:
          name: sst-outputs
          path: .sst/output.json
          if-no-files-found: warn
